config:
  validation: true
  warningsAsErrors: false
  excludes: ''

complexity:
  LongMethod:
    active: true
    threshold: 120
    ignoreAnnotated:
      - Composable
  TooManyFunctions:
    active: true
    thresholdInClasses: 40
    thresholdInInterfaces: 40
    thresholdInObjects: 40
    ignoreAnnotated:
      - HiltViewModel
    ignorePrivate: true
  CyclomaticComplexMethod:
    active: true
    threshold: 20
    ignoreSingleWhenExpression: true
  LongParameterList:
    active: true
    functionThreshold: 10
    constructorThreshold: 12
    ignoreAnnotated:
      - Composable
      - HiltViewModel
  NestedBlockDepth:
    active: true
    threshold: 6


exceptions:
  InstanceOfCheckForException:
    active: false
  TooGenericExceptionCaught:
    active: false
  SwallowedException:
    active: false
  PrintStackTrace:
    active: false
naming:
  ClassNaming:
    excludes: &testFolders
      - '**/test/**'
      - '**/androidTest/**'
  ConstructorParameterNaming:
    excludes: *testFolders
  FunctionNaming:
    ignoreAnnotated:
      [ 'Composable' ]
    active: true
    excludes: [ '**/jvmTest/**', '**/test/**', '**/androidTest/**', '**/commonTest/**' ]
    functionPattern: '[a-z][a-zA-Z0-9]*'
    excludeClassPattern: '$^'
style:
  UnusedPrivateMember:
    active: true
    ignoreAnnotated:
      - Preview
      - PreviewLightDark
      - TDPreviewForm
      - TDPreviewDialog
      - TDPreviewWide
      - TDPreviewNoBg
      - TDPreview
      - Composable
  MagicNumber:
    active: false
  ReturnCount:
    active: true
    max: 5
  MaxLineLength:
    active: false
  UnusedParameter:
    active: false
formatting:
  active: true
  NoUnusedImports:
    active: true
  Indentation:
    active: false
  MaximumLineLength:
    active: false
  Wrapping:
    active: false
  ArgumentListWrapping:
    active: false
  ParameterListWrapping:
    active: false
  MultiLineIfElse:
    active: false
